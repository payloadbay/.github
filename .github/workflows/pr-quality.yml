name: PR Quality

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  anti-slop:
    name: Anti-Slop
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate pull request quality
        uses: peakoss/anti-slop@57858eead489d08b255fab2af45a506c2ca6eab2 # v0.3.0
        with:
          max-failures: 4
          allowed-target-branches: master
          blocked-source-branches: |
            main
            master
          max-changed-files: 50
          max-changed-lines: 10000
          require-maintainer-can-modify: true
          require-conventional-title: true
          require-description: true
          max-description-length: 12000
          max-emoji-count: 40
          max-code-references: 20
          require-linked-issue: true
          blocked-terms: PINEAPPLE
          require-pr-template: true
          strict-pr-template-sections: "📋 Checklist"
          optional-pr-template-sections: |
            🧩 Type of Change
            🗺️ Areas
            How AI Was Used
            AI Tools and Human Review
            AI Responsibility
            📸 Screenshots, Logs, or Traces
            💬 Additional Context
          max-additional-pr-template-sections: 2
          max-commit-message-length: 500
          require-conventional-commits: true
          require-commit-author-match: true
          blocked-paths: |
            README.md
            SECURITY.md
            LICENSE
            CODE_OF_CONDUCT.md
          require-final-newline: true
          max-added-comments: 15
          detect-spam-usernames: true
          min-account-age: 14
          max-daily-forks: 6
          require-public-profile: false
          min-profile-completeness: 2
          min-repo-merged-prs: 1
          min-repo-merge-ratio: 30
          min-global-merge-ratio: 30
          global-merge-ratio-exclude-own: true
          exempt-bots: |
            actions-user
            autofix-ci[bot]
            dependabot[bot]
            renovate[bot]
            github-actions[bot]
          exempt-author-association: OWNER,MEMBER,COLLABORATOR
          exempt-label: quality:exempt
          success-add-pr-labels: quality:verified
          failure-remove-pr-labels: quality:verified
          failure-add-pr-labels: quality:rejected
          failure-pr-message: |
            This pull request failed multiple independent quality checks and was closed automatically.

            If this is a legitimate contribution, review the pull request template and contribution guidelines, correct the reported problems, and ask a maintainer to reassess it. Maintainers can apply `quality:exempt` when an automated check is not appropriate.
          close-pr: true
          lock-pr: false
