name: Repository Baseline

on:
  push:
    branches:
      - master
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/commitlint.config.mjs"
      - ".github/labeler.yml"
      - ".github/labels.json"
      - ".github/repository-baseline.json"
      - ".github/repository-baseline.schema.json"
      - ".github/scripts/repository-baseline.mjs"
      - ".github/scripts/repository-baseline.test.mjs"
      - ".github/workflows/metadata-labeler.yml"
      - ".github/workflows/commitlint.yml"
      - ".github/workflows/pr-quality.yml"
      - ".github/workflows/repository-baseline.yml"
      - "renovate-config.json"
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      repository:
        description: Optional repository name; leave empty to inspect every repository
        required: false
        type: string
      dry_run:
        description: Report drift without changing repositories
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: payloadbay-repository-baseline
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Baseline
    runs-on: ubuntu-latest

    steps:
      - name: Check out baseline
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate JSON
        run: |
          node -e 'for (const path of process.argv.slice(1)) JSON.parse(require("node:fs").readFileSync(path, "utf8"))' \
            .github/labels.json \
            .github/repository-baseline.json \
            .github/repository-baseline.schema.json \
            renovate-config.json

      - name: Test baseline synchronizer
        run: node --test .github/scripts/repository-baseline.test.mjs

  synchronize:
    name: Synchronize Repositories
    needs: validate
    if: ${{ vars.PAYLOADBAY_BASELINE_APP_ID != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out baseline
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Create installation token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v3.2.0
        with:
          app-id: ${{ vars.PAYLOADBAY_BASELINE_APP_ID }}
          private-key: ${{ secrets.PAYLOADBAY_BASELINE_APP_PRIVATE_KEY }}
          owner: payloadbay

      - name: Synchronize repository baseline
        env:
          BASELINE_APP_ID: ${{ vars.PAYLOADBAY_BASELINE_APP_ID }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REQUESTED_REPOSITORY: ${{ inputs.repository }}
          REQUESTED_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          arguments=()
          if [[ -n "$REQUESTED_REPOSITORY" ]]; then
            arguments+=(--repository "$REQUESTED_REPOSITORY")
          fi
          if [[ "$REQUESTED_DRY_RUN" == "true" ]]; then
            arguments+=(--dry-run)
          fi
          node .github/scripts/repository-baseline.mjs "${arguments[@]}"
