name: Metadata Labeler

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_call:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    name: Synchronize Labels
    runs-on: ubuntu-latest

    steps:
      - name: Check out central label configuration
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          repository: payloadbay/.github
          ref: master
          sparse-checkout: .github/labeler.yml
          sparse-checkout-cone-mode: false
          path: .payloadbay-community
          persist-credentials: false

      - name: Synchronize labels
        uses: srvaroa/labeler@bf262763a8a8e191f5847873aecc0f29df84f957 # v1.14.0
        with:
          config_path: .payloadbay-community/.github/labeler.yml
          use_local_config: true
          fail_on_error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
